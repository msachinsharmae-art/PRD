<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zimyo US Payroll</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ==================== LEFT SIDEBAR ==================== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h1 class="sidebar-logo">Zimyo <span class="highlight">US Payroll</span></h1>
    </div>

    <nav class="sidebar-nav">
      <a href="#/dashboard" class="nav-item active" data-route="dashboard">
        <span class="nav-icon">&#9638;</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#/company-setup" class="nav-item" data-route="company-setup">
        <span class="nav-icon">&#127970;</span>
        <span class="nav-label">Company Setup</span>
      </a>
      <a href="#/employees" class="nav-item" data-route="employees">
        <span class="nav-icon">&#128101;</span>
        <span class="nav-label">Employees</span>
      </a>
      <a href="#/pay-schedules" class="nav-item" data-route="pay-schedules">
        <span class="nav-icon">&#128197;</span>
        <span class="nav-label">Pay Schedules</span>
      </a>
      <a href="#/ot-plans" class="nav-item" data-route="ot-plans">
        <span class="nav-icon">&#9201;</span>
        <span class="nav-label">OT Plans</span>
      </a>
      <a href="#/break-rules" class="nav-item" data-route="break-rules">
        <span class="nav-icon">&#9749;</span>
        <span class="nav-label">Break Rules</span>
      </a>
      <a href="#/pto-leave" class="nav-item" data-route="pto-leave">
        <span class="nav-icon">&#127796;</span>
        <span class="nav-label">PTO &amp; Leave</span>
      </a>
      <a href="#/benefits" class="nav-item" data-route="benefits">
        <span class="nav-icon">&#128153;</span>
        <span class="nav-label">Benefits</span>
      </a>

      <div class="nav-separator"></div>

      <a href="#/run-payroll" class="nav-item nav-item--accent" data-route="run-payroll">
        <span class="nav-icon">&#9654;</span>
        <span class="nav-label">Run Payroll</span>
      </a>
      <a href="#/payslips" class="nav-item" data-route="payslips">
        <span class="nav-icon">&#128196;</span>
        <span class="nav-label">Payslips</span>
      </a>

      <div class="nav-separator"></div>

      <a href="#/compliance" class="nav-item" data-route="compliance">
        <span class="nav-icon">&#9989;</span>
        <span class="nav-label">Compliance</span>
      </a>
      <a href="#/reports" class="nav-item" data-route="reports">
        <span class="nav-icon">&#128202;</span>
        <span class="nav-label">Reports</span>
      </a>
      <a href="#/documents" class="nav-item" data-route="documents">
        <span class="nav-icon">&#128193;</span>
        <span class="nav-label">Documents</span>
      </a>
      <a href="#/ai-assistant" class="nav-item" data-route="ai-assistant">
        <span class="nav-icon">&#10024;</span>
        <span class="nav-label">AI Assistant</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-version">v1.0.0 &middot; US Payroll Engine</span>
    </div>
  </aside>

  <!-- ==================== MAIN AREA ==================== -->
  <main class="main-area">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">&#9776;</button>
        <h2 class="topbar-title" id="topbar-title">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <span class="topbar-company">Zimyo Inc.</span>
        <button class="topbar-settings" aria-label="Settings">&#9881;</button>
      </div>
    </header>

    <!-- Page Content (modules render here) -->
    <div id="page-content" class="page-content"></div>

  </main>

  <!-- ==================== TOAST NOTIFICATIONS ==================== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ==================== MODULE SCRIPTS ==================== -->
  <script src="app.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="modules/companySetup.js"></script>
  <script src="modules/employees.js"></script>
  <script src="modules/paySchedules.js"></script>
  <script src="modules/otPlans.js"></script>
  <script src="modules/breakRules.js"></script>
  <script src="modules/ptoLeave.js"></script>
  <script src="modules/benefits.js"></script>
  <script src="modules/runPayroll.js"></script>
  <script src="modules/payslips.js"></script>
  <script src="modules/compliance.js"></script>
  <script src="modules/reports.js"></script>
  <script src="modules/documents.js"></script>
  <script src="modules/aiAssistant.js"></script>

</body>
</html>
