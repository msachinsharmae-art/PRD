<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Stubs - US Payroll</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }

    /* ── Header ───────────────────────────────────────────── */
    .header { background: #1a2332; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; }
    .header-brand { font-size: 18px; font-weight: 700; margin-right: 32px; letter-spacing: 0.5px; }
    .header-brand span { color: #2563eb; }
    .nav { display: flex; gap: 4px; flex: 1; }
    .nav a { padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; color: #94a3b8; transition: all .15s; }
    .nav a:hover { color: #fff; background: rgba(255,255,255,.08); }
    .nav a.active { color: #fff; background: #2563eb; }
    .state-select { margin-left: auto; }
    .state-select select { background: #263245; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

    /* ── Layout ────────────────────────────────────────────── */
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }

    /* ── Filters ───────────────────────────────────────────── */
    .filters { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; background: #fff; padding: 16px 20px; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
    .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; min-width: 180px; background: #fff; }
    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
    .btn-outline:hover { background: #f9fafb; border-color: #9ca3af; }

    /* ── Table ──────────────────────────────────────────────── */
    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .card-header h3 { font-size: 16px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; text-align: left; padding: 10px 16px; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #e5e7eb; }
    td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
    tr:hover td { background: #f8fafc; }
    .text-right { text-align: right; }
    .text-center { text-align: center; }
    .amount { font-variant-numeric: tabular-nums; font-weight: 500; }

    /* ── Empty / Loading ──────────────────────────────────── */
    .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 32px; color: #94a3b8; }

    /* ── Modal / Detail Overlay ────────────────────────────── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; overflow-y: auto; padding: 24px; }
    .overlay.open { display: flex; justify-content: center; align-items: flex-start; }
    .stub-detail { background: #fff; max-width: 820px; width: 100%; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,.18); margin: 24px auto; }
    .stub-detail-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #e5e7eb; }
    .stub-detail-header h2 { font-size: 18px; font-weight: 700; }
    .close-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #64748b; padding: 4px 8px; border-radius: 4px; }
    .close-btn:hover { background: #f1f5f9; color: #1a1a2e; }

    /* ── Pay Stub Print Layout ─────────────────────────────── */
    .stub-body { padding: 24px; }
    .stub-company { text-align: center; margin-bottom: 16px; border-bottom: 2px solid #1a2332; padding-bottom: 12px; }
    .stub-company h2 { font-size: 20px; font-weight: 700; color: #1a2332; }
    .stub-company p { font-size: 13px; color: #64748b; margin-top: 2px; }
    .stub-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; font-size: 13px; }
    .stub-meta-group { padding: 12px; background: #f8fafc; border-radius: 6px; }
    .stub-meta-group strong { display: block; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .stub-section { margin-bottom: 16px; }
    .stub-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #2563eb; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #e5e7eb; }
    .stub-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .stub-table th { background: #f1f5f9; padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; }
    .stub-table td { padding: 5px 10px; border-bottom: 1px solid #f1f5f9; }
    .stub-table .total-row td { font-weight: 700; border-top: 2px solid #1a2332; background: #f8fafc; }

    .net-pay-box { background: #2563eb; color: #fff; padding: 16px 24px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin: 16px 0; }
    .net-pay-box .label { font-size: 16px; font-weight: 700; }
    .net-pay-box .value { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; }

    .employer-section { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; }
    .employer-section .stub-section-title { color: #16a34a; border-bottom-color: #bbf7d0; }

    .leave-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .leave-item { background: #f8fafc; border-radius: 6px; padding: 10px; text-align: center; }
    .leave-item .type { font-size: 11px; color: #64748b; text-transform: uppercase; font-weight: 600; }
    .leave-item .hours { font-size: 18px; font-weight: 700; color: #1a2332; }

    .state-info { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #1e40af; margin-top: 12px; }

    .print-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 12px; border-top: 1px solid #e5e7eb; }

    /* ── Print Styles ──────────────────────────────────────── */
    @media print {
      body { background: #fff; }
      .header, .filters, .card, .overlay .stub-detail-header, .print-actions, .close-btn { display: none !important; }
      .overlay { position: static !important; display: block !important; background: none !important; padding: 0 !important; }
      .stub-detail { box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; }
      .stub-body { padding: 0 !important; }
      .net-pay-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* ── Badge ─────────────────────────────────────────────── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .badge-gray { background: #f1f5f9; color: #475569; }
  </style>
<script>
if (window.self !== window.top) {
  document.documentElement.classList.add('in-iframe');
  document.addEventListener('DOMContentLoaded', function() {
    var h = document.querySelector('.header'); if(h) h.style.display='none';
    document.body.style.paddingTop = '0';
  });
}
</script>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────── -->
<header class="header">
  <div class="header-brand">US <span>Payroll</span></div>
  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="employees.html">Employees</a>
    <a href="pay-runs.html">Pay Runs</a>
    <a href="pay-stubs.html" class="active">Pay Stubs</a>
    <a href="reports.html">Reports</a>
  </nav>
  <div class="state-select">
    <select id="stateSelector">
      <option value="">All States</option>
    </select>
  </div>
</header>

<!-- ── Main Content ───────────────────────────────────────── -->
<div class="container">
  <h1 class="page-title">Pay Stubs</h1>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Employee</label>
      <select id="filterEmployee">
        <option value="">All Employees</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Pay Run</label>
      <select id="filterPayRun">
        <option value="">All Pay Runs</option>
      </select>
    </div>
    <div class="filter-group">
      <label>From</label>
      <input type="date" id="filterFrom">
    </div>
    <div class="filter-group">
      <label>To</label>
      <input type="date" id="filterTo">
    </div>
    <button class="btn btn-primary" onclick="loadStubs()">Search</button>
    <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
  </div>

  <!-- Stubs Table -->
  <div class="card">
    <div class="card-header">
      <h3>Pay Stub Records</h3>
      <span id="stubCount" class="badge badge-gray">0 stubs</span>
    </div>
    <div id="stubsTableWrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th>
            <th>Period</th>
            <th>Pay Date</th>
            <th class="text-right">Gross Pay</th>
            <th class="text-right">Net Pay</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="stubsBody">
          <tr><td colspan="6" class="empty-state"><div class="icon">&#128196;</div>No pay stubs found. Run a payroll first.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Pay Stub Detail Overlay ────────────────────────────── -->
<div class="overlay" id="stubOverlay">
  <div class="stub-detail">
    <div class="stub-detail-header">
      <h2>Pay Stub Detail</h2>
      <button class="close-btn" onclick="closeDetail()">&times;</button>
    </div>
    <div class="stub-body" id="stubDetailContent">
      <div class="loading">Loading pay stub...</div>
    </div>
  </div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const API = '/api/us-payroll';
const fmt = (n) => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '-';

// ── Cached data ─────────────────────────────────────────────
let employees = [];
let payRuns = [];
let allStubs = [];

// ── Init ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  await Promise.all([loadEmployees(), loadPayRuns(), loadStates()]);
  loadStubs();
});

async function loadStates() {
  try {
    const res = await fetch(`${API}/states`);
    const data = await res.json();
    const sel = document.getElementById('stateSelector');
    (data.states || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.code;
      opt.textContent = `${s.code} - ${s.name || s.code}`;
      sel.appendChild(opt);
    });
  } catch (e) { console.warn('States load failed', e); }
}

async function loadEmployees() {
  try {
    const res = await fetch(`${API}/employees`);
    const data = await res.json();
    employees = data.employees || [];
    const sel = document.getElementById('filterEmployee');
    employees.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.employee_id;
      opt.textContent = `${e.first_name} ${e.last_name} (${e.employee_id})`;
      sel.appendChild(opt);
    });
  } catch (e) { console.warn('Employees load failed', e); }
}

async function loadPayRuns() {
  try {
    const res = await fetch(`${API}/pay-runs`);
    const data = await res.json();
    payRuns = data.pay_runs || [];
    const sel = document.getElementById('filterPayRun');
    payRuns.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.pay_run_id;
      opt.textContent = `${r.pay_run_id} (${r.state} | ${fmtDate(r.pay_period_start)} - ${fmtDate(r.pay_period_end)})`;
      sel.appendChild(opt);
    });
  } catch (e) { console.warn('Pay runs load failed', e); }
}

async function loadStubs() {
  const empId = document.getElementById('filterEmployee').value;
  const runId = document.getElementById('filterPayRun').value;
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;

  const params = new URLSearchParams();
  if (empId) params.set('employee_id', empId);
  if (runId) params.set('pay_run_id', runId);

  const body = document.getElementById('stubsBody');
  body.innerHTML = '<tr><td colspan="6" class="loading">Loading...</td></tr>';

  try {
    const res = await fetch(`${API}/pay-stubs?${params}`);
    const data = await res.json();
    let stubs = data.stubs || [];

    // Client-side date filter
    if (from) stubs = stubs.filter(s => (s.pay_date || s.pay_period_start || '') >= from);
    if (to) stubs = stubs.filter(s => (s.pay_date || s.pay_period_end || '') <= to);

    // Sort by pay_date desc
    stubs.sort((a, b) => (b.pay_date || '').localeCompare(a.pay_date || ''));
    allStubs = stubs;

    document.getElementById('stubCount').textContent = `${stubs.length} stub${stubs.length !== 1 ? 's' : ''}`;

    if (stubs.length === 0) {
      body.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="icon">&#128196;</div>No pay stubs match your filters.</td></tr>';
      return;
    }

    body.innerHTML = stubs.map(s => {
      const emp = employees.find(e => e.employee_id === s.employee_id);
      const empName = emp ? `${emp.first_name} ${emp.last_name}` : s.employee_id;
      return `<tr>
        <td><strong>${empName}</strong><br><span style="font-size:12px;color:#64748b">${s.employee_id}</span></td>
        <td>${fmtDate(s.pay_period_start)} - ${fmtDate(s.pay_period_end)}</td>
        <td>${fmtDate(s.pay_date)}</td>
        <td class="text-right amount">${fmt(s.earnings?.gross_pay)}</td>
        <td class="text-right amount" style="color:#16a34a;font-weight:700">${fmt(s.net_pay)}</td>
        <td class="text-center"><button class="btn btn-sm btn-primary" onclick="viewStub('${s.stub_id}')">View</button></td>
      </tr>`;
    }).join('');

  } catch (e) {
    console.error('Load stubs error', e);
    body.innerHTML = '<tr><td colspan="6" class="empty-state" style="color:#ef4444">Error loading pay stubs. Is the server running?</td></tr>';
  }
}

function clearFilters() {
  document.getElementById('filterEmployee').value = '';
  document.getElementById('filterPayRun').value = '';
  document.getElementById('filterFrom').value = '';
  document.getElementById('filterTo').value = '';
  loadStubs();
}

// ── View Stub Detail ────────────────────────────────────────
async function viewStub(stubId) {
  const overlay = document.getElementById('stubOverlay');
  const content = document.getElementById('stubDetailContent');
  overlay.classList.add('open');
  content.innerHTML = '<div class="loading">Loading pay stub detail...</div>';

  try {
    const res = await fetch(`${API}/pay-stubs/${stubId}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Failed to load');

    const stub = data.stub;
    const emp = data.employee || {};
    const company = data.company || {};

    content.innerHTML = renderStubDetail(stub, emp, company);
  } catch (e) {
    content.innerHTML = `<div class="empty-state" style="color:#ef4444">Error: ${e.message}</div>`;
  }
}

function closeDetail() {
  document.getElementById('stubOverlay').classList.remove('open');
}

// Close overlay on outside click
document.getElementById('stubOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── Render Full Pay Stub ────────────────────────────────────
function renderStubDetail(stub, emp, company) {
  const h = stub.hours || {};
  const earn = stub.earnings || {};
  const pre = stub.pre_tax_deductions || {};
  const taxes = stub.taxes || {};
  const post = stub.post_tax_deductions || {};
  const ytd = stub.ytd_snapshot || {};
  const er = stub.employer_taxes || {};
  const state = stub.work_state || emp.work_state || '';

  // Build earnings rows
  const earningsRows = [];
  if (h.regular || earn.regular_pay)   earningsRows.push({ desc: 'Regular Pay', hours: h.regular, rate: emp.pay_rate || (emp.pay_type === 'salary' ? '-' : ''), current: earn.regular_pay, ytd: ytd.gross_pay });
  if (h.overtime || earn.overtime_pay) earningsRows.push({ desc: 'Overtime (1.5x)', hours: h.overtime, rate: emp.pay_rate ? (emp.pay_rate * 1.5).toFixed(2) : '-', current: earn.overtime_pay, ytd: null });
  if (h.double_time || earn.double_time_pay) earningsRows.push({ desc: 'Double Time (2x)', hours: h.double_time, rate: emp.pay_rate ? (emp.pay_rate * 2).toFixed(2) : '-', current: earn.double_time_pay, ytd: null });
  if (h.holiday || earn.holiday_pay)   earningsRows.push({ desc: 'Holiday Pay', hours: h.holiday, rate: '', current: earn.holiday_pay, ytd: null });
  if (h.pto || earn.pto_pay)           earningsRows.push({ desc: 'PTO / Vacation', hours: h.pto, rate: '', current: earn.pto_pay, ytd: null });
  if (h.sick || earn.sick_pay)         earningsRows.push({ desc: 'Sick Pay', hours: h.sick, rate: '', current: earn.sick_pay, ytd: null });
  if (earn.commission)                 earningsRows.push({ desc: 'Commission', hours: '', rate: '', current: earn.commission, ytd: null });
  if (earn.bonus)                      earningsRows.push({ desc: 'Bonus', hours: '', rate: '', current: earn.bonus, ytd: null });
  if (earn.tips)                       earningsRows.push({ desc: 'Tips', hours: '', rate: '', current: earn.tips, ytd: null });
  if (earn.reimbursement)              earningsRows.push({ desc: 'Reimbursement (non-taxable)', hours: '', rate: '', current: earn.reimbursement, ytd: null });
  if (earn.other)                      earningsRows.push({ desc: 'Other Earnings', hours: '', rate: '', current: earn.other, ytd: null });

  // Pre-tax deduction rows
  const preRows = [];
  if (pre.retirement_401k)  preRows.push({ desc: '401(k) Retirement', current: pre.retirement_401k });
  if (pre.roth_401k)        preRows.push({ desc: 'Roth 401(k)', current: pre.roth_401k });
  if (pre.health_insurance) preRows.push({ desc: 'Health Insurance', current: pre.health_insurance });
  if (pre.dental_insurance) preRows.push({ desc: 'Dental Insurance', current: pre.dental_insurance });
  if (pre.vision_insurance) preRows.push({ desc: 'Vision Insurance', current: pre.vision_insurance });
  if (pre.hsa)              preRows.push({ desc: 'HSA', current: pre.hsa });
  if (pre.fsa)              preRows.push({ desc: 'FSA', current: pre.fsa });

  // Tax rows
  const taxRows = [];
  taxRows.push({ desc: 'Federal Income Tax', current: taxes.federal_income, ytd: ytd.federal_tax });
  taxRows.push({ desc: 'Social Security (6.2%)', current: taxes.social_security, ytd: ytd.ss_tax });
  taxRows.push({ desc: 'Medicare (1.45%)', current: taxes.medicare, ytd: ytd.medicare_tax });
  if (taxes.additional_medicare) taxRows.push({ desc: 'Additional Medicare (0.9%)', current: taxes.additional_medicare, ytd: null });
  taxRows.push({ desc: 'State Income Tax', current: taxes.state_income, ytd: ytd.state_tax });
  if (taxes.state_disability)  taxRows.push({ desc: 'State Disability Insurance', current: taxes.state_disability, ytd: null });
  if (taxes.state_family_leave) taxRows.push({ desc: 'Family Leave Insurance', current: taxes.state_family_leave, ytd: null });
  if (taxes.local_tax) taxRows.push({ desc: 'Local Tax', current: taxes.local_tax, ytd: ytd.local_tax });

  // Post-tax deduction rows
  const postRows = [];
  if (post.garnishments) postRows.push({ desc: 'Garnishments', current: post.garnishments });
  if (post.roth_ira)     postRows.push({ desc: 'Roth IRA', current: post.roth_ira });
  if (post.union_dues)   postRows.push({ desc: 'Union Dues', current: post.union_dues });
  if (post.other)        postRows.push({ desc: 'Other Deductions', current: post.other });

  // Employer contributions
  const erRows = [];
  if (er.ss_employer)       erRows.push({ desc: 'Social Security (Employer)', current: er.ss_employer });
  if (er.medicare_employer) erRows.push({ desc: 'Medicare (Employer)', current: er.medicare_employer });
  if (er.futa)              erRows.push({ desc: 'FUTA', current: er.futa });
  if (er.suta)              erRows.push({ desc: 'SUTA', current: er.suta });

  // SSN mask
  const ssnDisplay = emp.ssn ? `***-**-${emp.ssn.slice(-4)}` : 'N/A';

  // State-specific items
  let stateSpecific = '';
  if (state === 'CA') {
    stateSpecific = `
      <div class="state-info">
        <strong>California (${String.fromCodePoint(0x2139)} Per Labor Code ${'&sect;'}226):</strong>
        Itemized hours shown above. Sick leave balance included in leave section.
        ${company.company_name ? `<br>Employer: ${company.company_name}` : ''}
        ${company.company_address ? ` | ${company.company_address}` : ''}
      </div>`;
  } else if (state === 'NY') {
    stateSpecific = `
      <div class="state-info">
        <strong>New York:</strong> Pay frequency: ${emp.pay_frequency || 'N/A'}.
        Overtime rate and hours itemized above per NY Labor Law.
      </div>`;
  }

  // Leave balances (mock - from employee if available)
  const leave = emp.leave_balances || { vacation: 80, sick: 40, personal: 16 };

  return `
    <!-- Company Header -->
    <div class="stub-company">
      <h2>${company.company_name || 'Company Name'}</h2>
      <p>${company.company_address || '123 Main Street, Suite 100'}</p>
      <p>${company.company_city || 'City'}, ${company.company_state || state || 'ST'} ${company.company_zip || '00000'}</p>
    </div>

    <!-- Employee + Period Meta -->
    <div class="stub-meta">
      <div class="stub-meta-group">
        <strong>Employee Information</strong>
        <div><b>${emp.first_name || ''} ${emp.last_name || ''}</b></div>
        <div>ID: ${emp.employee_id || stub.employee_id || ''} &nbsp;|&nbsp; SSN: ${ssnDisplay}</div>
        <div>Department: ${emp.department || 'N/A'} &nbsp;|&nbsp; Title: ${emp.job_title || 'N/A'}</div>
      </div>
      <div class="stub-meta-group">
        <strong>Pay Period</strong>
        <div><b>${fmtDate(stub.pay_period_start)} - ${fmtDate(stub.pay_period_end)}</b></div>
        <div>Pay Date: ${fmtDate(stub.pay_date)}</div>
        <div>State: ${state} &nbsp;|&nbsp; Pay Type: ${emp.pay_type || 'N/A'}</div>
      </div>
    </div>

    <!-- Earnings -->
    <div class="stub-section">
      <div class="stub-section-title">Earnings</div>
      <table class="stub-table">
        <thead><tr><th>Description</th><th class="text-right">Hours</th><th class="text-right">Rate</th><th class="text-right">Current</th><th class="text-right">YTD</th></tr></thead>
        <tbody>
          ${earningsRows.map(r => `<tr>
            <td>${r.desc}</td>
            <td class="text-right">${r.hours || '-'}</td>
            <td class="text-right">${r.rate ? fmt(r.rate).replace('$', '$') : '-'}</td>
            <td class="text-right amount">${fmt(r.current)}</td>
            <td class="text-right amount" style="color:#64748b">${r.ytd != null ? fmt(r.ytd) : '-'}</td>
          </tr>`).join('')}
          <tr class="total-row">
            <td>Gross Pay</td>
            <td class="text-right">${h.total || '-'}</td>
            <td></td>
            <td class="text-right amount">${fmt(earn.gross_pay)}</td>
            <td class="text-right amount" style="color:#64748b">${fmt(ytd.gross_pay)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pre-Tax Deductions -->
    ${preRows.length > 0 ? `
    <div class="stub-section">
      <div class="stub-section-title">Pre-Tax Deductions</div>
      <table class="stub-table">
        <thead><tr><th>Description</th><th class="text-right">Current</th><th class="text-right">YTD</th></tr></thead>
        <tbody>
          ${preRows.map(r => `<tr><td>${r.desc}</td><td class="text-right amount">${fmt(r.current)}</td><td class="text-right amount" style="color:#64748b">-</td></tr>`).join('')}
          <tr class="total-row"><td>Total Pre-Tax</td><td class="text-right amount">${fmt(pre.total_pre_tax)}</td><td class="text-right">-</td></tr>
        </tbody>
      </table>
    </div>` : ''}

    <!-- Taxes -->
    <div class="stub-section">
      <div class="stub-section-title">Taxes</div>
      <table class="stub-table">
        <thead><tr><th>Description</th><th class="text-right">Current</th><th class="text-right">YTD</th></tr></thead>
        <tbody>
          ${taxRows.map(r => `<tr><td>${r.desc}</td><td class="text-right amount">${fmt(r.current)}</td><td class="text-right amount" style="color:#64748b">${r.ytd != null ? fmt(r.ytd) : '-'}</td></tr>`).join('')}
          <tr class="total-row"><td>Total Taxes</td><td class="text-right amount">${fmt(taxes.total_taxes)}</td><td class="text-right">-</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Post-Tax Deductions -->
    ${postRows.length > 0 ? `
    <div class="stub-section">
      <div class="stub-section-title">Post-Tax Deductions</div>
      <table class="stub-table">
        <thead><tr><th>Description</th><th class="text-right">Current</th><th class="text-right">YTD</th></tr></thead>
        <tbody>
          ${postRows.map(r => `<tr><td>${r.desc}</td><td class="text-right amount">${fmt(r.current)}</td><td class="text-right amount" style="color:#64748b">-</td></tr>`).join('')}
          <tr class="total-row"><td>Total Post-Tax</td><td class="text-right amount">${fmt(post.total_post_tax)}</td><td class="text-right">-</td></tr>
        </tbody>
      </table>
    </div>` : ''}

    <!-- Net Pay -->
    <div class="net-pay-box">
      <div class="label">NET PAY</div>
      <div class="value">${fmt(stub.net_pay)}</div>
    </div>

    <!-- Employer Contributions -->
    ${erRows.length > 0 ? `
    <div class="employer-section">
      <div class="stub-section">
        <div class="stub-section-title">Employer Contributions (Informational)</div>
        <table class="stub-table">
          <thead><tr><th>Description</th><th class="text-right">Current</th></tr></thead>
          <tbody>
            ${erRows.map(r => `<tr><td>${r.desc}</td><td class="text-right amount">${fmt(r.current)}</td></tr>`).join('')}
            <tr class="total-row"><td>Total Employer Cost</td><td class="text-right amount">${fmt(er.total_employer)}</td></tr>
          </tbody>
        </table>
      </div>
    </div>` : ''}

    <!-- Leave Balances -->
    <div class="stub-section">
      <div class="stub-section-title">Leave Balances (Hours)</div>
      <div class="leave-section">
        <div class="leave-item"><div class="type">Vacation</div><div class="hours">${leave.vacation || 0}</div></div>
        <div class="leave-item"><div class="type">Sick</div><div class="hours">${leave.sick || 0}</div></div>
        <div class="leave-item"><div class="type">Personal</div><div class="hours">${leave.personal || 0}</div></div>
        ${state === 'CA' ? '<div class="leave-item" style="border:1px solid #bfdbfe;background:#eff6ff"><div class="type">CA Sick (Min)</div><div class="hours">' + (leave.ca_sick || leave.sick || 40) + '</div></div>' : ''}
      </div>
    </div>

    <!-- State-Specific Info -->
    ${stateSpecific}

    <!-- Print Actions -->
    <div class="print-actions">
      <button class="btn btn-outline" onclick="closeDetail()">Close</button>
      <button class="btn btn-primary" onclick="window.print()">Print Pay Stub</button>
    </div>
  `;
}
</script>
</body>
</html>
