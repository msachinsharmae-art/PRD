<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Statutory Rule Configuration — GlobalTax AI</title>
<link rel="stylesheet" href="/css/styles.css">
<script type="module" src="/js/shell.js"></script>
<style>
  .cfg-layout { display: grid; grid-template-columns: 240px 1fr; gap: 18px; align-items: flex-start; }
  @media (max-width: 900px) { .cfg-layout { grid-template-columns: 1fr; } }
  .cfg-picker { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 8px; position: sticky; top: calc(var(--topbar-h) + 16px); }
  .cfg-group { padding: 8px 10px 4px; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
  .cfg-picker-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text); }
  .cfg-picker-item:hover { background: var(--surface-2); }
  .cfg-picker-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }

  .cfg-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .cfg-block h3 { margin: 0 0 4px; font-size: 16px; }
  .cfg-block .authority { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .rule-grid { display: grid; grid-template-columns: 1fr 120px 1fr; gap: 8px; align-items: center; font-size: 13px; }
  .rule-grid .h { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .rule-grid .val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .rule-grid .head { color: var(--text); }
  .rule-grid .note { color: var(--muted); font-size: 12px; }
  .editable { background: var(--surface-2); border: 1px dashed var(--border); padding: 2px 8px; border-radius: 4px; display: inline-block; cursor: text; min-width: 60px; font-variant-numeric: tabular-nums; }
  .editable:focus { outline: 2px solid var(--accent); background: var(--surface); }

  .state-mat { overflow-x: auto; }
  .state-mat table { font-size: 12.5px; }
  .state-mat th { position: sticky; top: 0; background: var(--surface-2); z-index: 1; }

  .act-badges { display: flex; gap: 8px; margin: 6px 0 14px; flex-wrap: wrap; }
  .act-badges .badge { font-size: 10.5px; }

  .slab-table { width: 100%; }
  .slab-table th, .slab-table td { padding: 8px 10px; }

  .save-hint { font-size: 11.5px; color: var(--muted); margin-top: 12px; }
</style>
</head>
<body>

<div class="container wide">
  <div class="page-title-row">
    <div>
      <h1>Statutory Rule Library</h1>
      <p class="muted">Every payroll rule the engine uses — by country, by head, with sources. Edit yellow-boxed values to run local what-ifs; changes persist in this browser only.</p>
    </div>
  </div>

  <div class="cfg-layout">
    <div class="cfg-picker" id="cfgPicker"></div>
    <div id="cfgPanel"></div>
  </div>
</div>

<script type="module" src="/js/configure.js"></script>
</body>
</html>
